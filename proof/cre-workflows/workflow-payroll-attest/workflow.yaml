# ==========================================================================
# Workflow: Payroll Attestation
# ==========================================================================
# On-chain attestation of payroll batch payments.
# Triggered by triggerPayrollAttestation() after batch execution completes.
# Run: cre workflow simulate workflow-payroll-attest --target local-simulation

local-simulation:
  user-workflow:
    workflow-name: "workflow-payroll-attest"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.json"
    secrets-path: "../secrets.yaml"

staging:
  user-workflow:
    workflow-name: "workflow-payroll-attest"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.json"
    secrets-path: "../secrets.yaml"
