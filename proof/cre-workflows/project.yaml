# ==========================================================================
# CRE PROJECT SETTINGS FILE
# ==========================================================================
# Global configuration for all CRE workflows in this project.
# Each target defines RPC endpoints and optional DON settings.
#
# Run workflows with:
#   cre workflow simulate <workflow-name> --target local-simulation

# ==========================================================================
local-simulation:
  rpcs:
    - chain-name: ethereum-testnet-sepolia
      url: https://0xrpc.io/sep
    - chain-name: avalanche-testnet-fuji
      url: https://api.avax-test.network/ext/bc/C/rpc
    - chain-name: ethereum-testnet-sepolia-base-1
      url: https://sepolia.base.org
    - chain-name: ethereum-testnet-sepolia-arbitrum-1
      url: https://sepolia-rollup.arbitrum.io/rpc
    - chain-name: polygon-testnet-amoy
      url: https://rpc-amoy.polygon.technology

# ==========================================================================
staging:
  cre-cli:
    don-family: "zone-a"
  rpcs:
    - chain-name: ethereum-testnet-sepolia
      url: ""
    - chain-name: avalanche-testnet-fuji
      url: ""
    - chain-name: ethereum-testnet-sepolia-base-1
      url: ""
