# ==========================================================================
# Workflow: Example
# ==========================================================================
# Demonstrates the reusable CRE workflow pattern.
# Run: cre workflow simulate workflow-example --target local-simulation

local-simulation:
  user-workflow:
    workflow-name: "workflow-example"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.json"
    secrets-path: "../secrets.yaml"

staging:
  user-workflow:
    workflow-name: "workflow-example"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.json"
    secrets-path: "../secrets.yaml"
