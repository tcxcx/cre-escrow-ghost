# ==========================================================================
# Workflow: Escrow Deploy (HTTP trigger)
# ==========================================================================
# Deploys EscrowWithAgentV3 via EscrowFactory, publishes attestation.
# Run: cre workflow simulate workflow-escrow-deploy --target local-simulation

local-simulation:
  user-workflow:
    workflow-name: "workflow-escrow-deploy"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.json"
    secrets-path: "./secrets.yaml"

staging:
  user-workflow:
    workflow-name: "workflow-escrow-deploy"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.json"
    secrets-path: "./secrets.yaml"
