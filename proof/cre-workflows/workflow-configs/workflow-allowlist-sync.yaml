# Verifies PolicyEngine AllowList status and publishes attestation.
# Triggered by Shiva after Persona KYC/KYB webhook processing.
# Run: cre workflow simulate workflow-allowlist-sync --target local-simulation

local-simulation:
  user-workflow:
    workflow-name: "workflow-allowlist-sync"
