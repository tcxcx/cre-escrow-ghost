# ==========================================================================
# CRE SECRETS DECLARATION
# ==========================================================================
# Maps CRE secret IDs (used in runtime.getSecret()) to environment
# variable names (defined in .env). Never commit actual secret values.

secretsNames:
  # API Keys
  SHIVA_API_KEY:
    - SHIVA_API_KEY_VAR
  MOTORA_API_KEY:
    - MOTORA_API_KEY_VAR
  SUPABASE_SERVICE_KEY:
    - SUPABASE_SERVICE_KEY_VAR
  ACE_API_KEY:
    - ACE_API_KEY_VAR

  # Service URLs (resolved from env — never hardcoded in config.json)
  SHIVA_URL:
    - SHIVA_URL_VAR
  MOTORA_URL:
    - MOTORA_URL_VAR
  SUPABASE_URL:
    - SUPABASE_URL_VAR
  ACE_URL:
    - ACE_URL_VAR
